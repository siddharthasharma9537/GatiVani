version: 2
updates:
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels: [ "dependencies", "dart" ]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      firebase:
        patterns:
          - "firebase_*"
      riverpod:
        patterns:
          - "riverpod*"
          - "flutter_riverpod"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: [ "dependencies", "ci" ]
    commit-message:
      prefix: "ci(actions)"

  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "monthly"
    labels: [ "dependencies", "android" ]
    commit-message:
      prefix: "chore(android)"

  - package-ecosystem: "bundler"
    directory: "/ios"
    schedule:
      interval: "monthly"
    labels: [ "dependencies", "ios" ]
    commit-message:
      prefix: "chore(ios)"
